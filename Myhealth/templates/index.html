{% extends 'navigationbar.html' %}
{% load static %}
{% block body %}

<div class="container" style="margin-top:90px">
    <h2 class="text-center text-primary fw-bold">Admin Dashboard</h2>
    <br><br>

    <div class="row text-center">
        <!-- Doctors -->
        <div class="col-sm-4 mydivstyle p-4">
            <h2 class="text-info fw-bold">{{ d }}</h2>
            <a href="{% url 'view_doctor' %}" class="text-decoration-none">
                <h4 class="text-danger fw-bold">Doctors</h4>
            </a>
            <hr class="rounded">
        </div>

        <!-- Patients -->
        <div class="col-sm-4 mydivstyle p-4">
            <h2 class="text-success fw-bold">{{ p }}</h2>
            <a href="{% url 'view_patient' %}" class="text-decoration-none">
                <h4 class="text-danger fw-bold">Patients</h4>
            </a>
            <hr class="rounded">
        </div>

        <!-- Appointments -->
        <div class="col-sm-4 mydivstyle p-4">
            <h2 class="text-warning fw-bold">{{ a }}</h2>
            <a href="{% url 'view_appointment' %}" class="text-decoration-none">
                <h4 class="text-danger fw-bold">Appointments</h4>
            </a>
            <hr class="rounded">
        </div>
    </div>
</div>

<style>
.mydivstyle {
    border-radius: 10px;
    transition: all 0.3s ease-in-out;
}
.mydivstyle:hover {
    background-color: #f8f9fa;
    transform: translateY(-8px);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
}
    body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #000000;
            font-family: Arial, sans-serif;
        }
</style>

{% endblock %}
