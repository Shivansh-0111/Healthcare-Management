{% extends 'navigationbar.html' %}
{% load static %}
{% block body %}

{% if error == "no" %}
<script>
    alert('Logged In Successfully');
    window.location.href = "{% url 'home' %}";
</script>
{% endif %}

{% if error == "yes" %}
<script>
    alert('Invalid Login Credentials, try again');
</script>
{% endif %}

<div class="container" style="margin-top:50px; max-width:500px;">
    <div class="card shadow-lg p-4 border-0 login-card">
        <h2 class="text-center text-primary mb-4">Admin Login</h2>
        <form method="post">
            {% csrf_token %}

            <label class="fw-bold">Admin Name</label>
            <input type="text" class="form-control mb-3" name="uname" placeholder="Enter username" required>

            <label class="fw-bold">Password</label>
            <input type="password" class="form-control mb-4" name="pwd" placeholder="Enter password" required>

            <input type="submit" value="Login" class="form-control btn btn-primary login-btn">
        </form>
    </div>
</div>

<style>
.login-card {
    border-radius: 15px;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.login-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
}
.login-btn:hover {
    background-color: #0d6efd;
    font-weight: bold;
    letter-spacing: 0.5px;
}
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #17313E;  /* 🔹 Change this color */
            font-family: Arial, sans-serif;
        }
</style>

{% endblock %}
